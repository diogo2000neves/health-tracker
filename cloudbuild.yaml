# Cloud Build pipeline — on push to main: run the unit tests, then build and
# deploy every Cloud Run target:
#   * health-tracker-daily   (Job)     from backend/Dockerfile
#   * health-tracker-ingest  (Service) from backend/ingest/Dockerfile
#
# This file lives at the REPO ROOT (the trigger reads `cloudbuild.yaml` from the
# root). The project is a monorepo — the deployable backend is under `backend/`,
# so every step that touches source runs with `dir: backend`, i.e. as if `backend/`
# were the working directory. That keeps the in-step paths (`Dockerfile`,
# `ingest/Dockerfile`, `.` as the build context) exactly as the backend expects.
#
# The test step is the deploy gate: a failing test stops the build before any
# image is built, so production keeps running the previous version.
#
# Image tag = commit SHA, so every running revision is traceable to a commit.
# `jobs update --image` / `deploy --image` swap ONLY the image and preserve each
# target's env vars + secret bindings (e.g. the daily job's health-oauth-token
# pin and HEALTH_START_DATE, the ingest service's Gemini/Drive secrets).
substitutions:
  _REGION: europe-west1
  _AR: europe-west1-docker.pkg.dev/health-tracker-501322/cloud-run-source-deploy

steps:
  # --- gate: unit tests ---
  - id: test
    name: python:3.12-slim
    dir: 'backend'
    entrypoint: bash
    args:
      - -c
      - pip install -q -r requirements.txt -r ingest/requirements.txt pytest
        && python -m pytest tests -q

  # --- daily job ---
  # Build context is backend/ so the image can COPY the shared schema/ registry.
  - id: build-daily
    name: gcr.io/cloud-builders/docker
    dir: 'backend'
    args: ['build', '-f', 'Dockerfile', '-t', '${_AR}/health-tracker-daily:$COMMIT_SHA', '.']
  - id: push-daily
    name: gcr.io/cloud-builders/docker
    args: ['push', '${_AR}/health-tracker-daily:$COMMIT_SHA']
  - id: deploy-daily
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: ['run', 'jobs', 'update', 'health-tracker-daily',
           '--image', '${_AR}/health-tracker-daily:$COMMIT_SHA', '--region', '${_REGION}']

  # --- ingest service ---
  # Context is backend/ (not `ingest`) so the image can COPY the shared schema/
  # registry and nutrient_info.json that the service depends on.
  - id: build-ingest
    name: gcr.io/cloud-builders/docker
    dir: 'backend'
    args: ['build', '-f', 'ingest/Dockerfile', '-t', '${_AR}/health-tracker-ingest:$COMMIT_SHA', '.']
  - id: push-ingest
    name: gcr.io/cloud-builders/docker
    args: ['push', '${_AR}/health-tracker-ingest:$COMMIT_SHA']
  - id: deploy-ingest
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: ['run', 'deploy', 'health-tracker-ingest',
           '--image', '${_AR}/health-tracker-ingest:$COMMIT_SHA', '--region', '${_REGION}']

images:
  - '${_AR}/health-tracker-daily:$COMMIT_SHA'
  - '${_AR}/health-tracker-ingest:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
